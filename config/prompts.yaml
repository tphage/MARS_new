      "status": "manufacturable",
      "process_recipe": [
        {
          "step_index": 1,
          "description": "step description",
          "conditions": "temperature, pressure, time, etc.",
          "equipment_class": "equipment type",
          "inputs": ["input material 1", "input material 2"]
        }
      ],
      "evidence": ["reasoning or general knowledge used"]
    }

    If blocked:
    {
      "status": "blocked",
      "blocking_constraints": [
        {
          "type": "precursor_availability|equipment|temperature_pressure|safety_regulatory|ip_proprietary|missing_critical_info|scale_infeasible",
          "severity": "hard|soft",
          "description": "description of the blocking issue"
        }
      ],
      "feedback_to_system2": "concise summary of why this candidate is not manufacturable"
    }

    Guidelines:
    - Assess precursor availability, equipment requirements, process conditions, safety, and regulatory aspects
    - Keep process steps high-level (e.g., "Prepare precursors", "Melt compound", "Mold to shape")
    - Include temperature, pressure, and equipment class where known
    - Respond with ONLY the JSON object, no other text

